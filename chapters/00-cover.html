<!DOCTYPE html>
<html lang="zh-CN" data-theme="tianjin" data-mode="presentation">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body class="chapter-page sci-fi-bg">
  <main class="main-stage">
    <div class="slide active">

      <!-- 全息门阵列扫描背景 -->
      <div class="cover-holodeck">
        <div class="holo-grid"></div>
        <div class="holo-scan"></div>
        <div class="holo-corner holo-corner-tl"></div>
        <div class="holo-corner holo-corner-tr"></div>
        <div class="holo-corner holo-corner-bl"></div>
        <div class="holo-corner holo-corner-br"></div>
      </div>

      <!-- 9 字符号阵列 （5+2+1+1） -->
      <div class="cover-agent-matrix">
        <div class="agent-cell agent-cell-5">5</div>
        <div class="agent-cell agent-cell-plus">+</div>
        <div class="agent-cell agent-cell-2">2</div>
        <div class="agent-cell agent-cell-plus">+</div>
        <div class="agent-cell agent-cell-1-1">1</div>
        <div class="agent-cell agent-cell-plus">+</div>
        <div class="agent-cell agent-cell-1-2">1</div>
        <div class="agent-cell agent-cell-eq">=</div>
        <div class="agent-cell agent-cell-9">9</div>
      </div>

      <!-- 主标题 -->
      <div class="cover-title-wrap">
        <h1 class="cover-title">
          <span class="cover-title-line1"><span class="burst-trigger" data-burst="burst-7agents" data-hint="👉 点击查看 7 大智能体">🎯 智能体赋能投资研究</span></span>
          <span class="cover-title-line2">从实践案例到团队跃迁</span>
        </h1>
        <div class="cover-sub">
          <span class="cover-chip">5 大 Agent</span>
          <span class="cover-chip">2 大助手</span>
          <span class="cover-chip">1 套知识中台</span>
          <span class="cover-chip">1 主公</span>
        </div>
        <p class="cover-author">决策者 · 投资部 · 2026.07</p>
      </div>

      <!-- 入口指引 -->
      <div class="cover-entry">
        <a href="01-opening.html" class="cover-entry-btn">
          <span class="entry-arrow">▶</span> 进入课件 · 开场破题
        </a>
      </div>

    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  document.querySelector('.slide').classList.add('ready');
  // 依次点亮 9 个阵列
  const cells = document.querySelectorAll('.agent-cell');
  cells.forEach((c, i) => setTimeout(() => c.classList.add('lit'), 200 + i * 120));
});
</script>
