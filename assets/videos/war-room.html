<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #050810;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    padding: 20px;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(circle at 50% 50%, rgba(240,136,62,0.15) 0%, transparent 50%),
      radial-gradient(circle at 20% 80%, rgba(255,200,55,0.10) 0%, transparent 50%),
      linear-gradient(rgba(240,136,62,0.04) 1px, transparent 1px) 0 0 / 40px 40px,
      linear-gradient(90deg, rgba(240,136,62,0.04) 1px, transparent 1px) 0 0 / 40px 40px;
    z-index: 0;
    animation: bgShift 20s linear infinite;
  }
  @keyframes bgShift {
    from { background-position: 0 0, 0 0, 0 0, 0 0; }
    to { background-position: 0 0, 0 0, 40px 40px, 40px 40px; }
  }

  #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

  .stage-wrap {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 1100px;
    display: flex;
    gap: 16px;
    align-items: stretch;
  }

  /* 左侧：7 维度雷达/网络 */
  .neural-pane {
    width: 220px;
    background: linear-gradient(180deg, rgba(13,17,23,0.95) 0%, rgba(22,27,34,0.85) 100%);
    border: 1px solid rgba(240,136,62,0.3);
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 0 40px rgba(240,136,62,0.15), inset 0 0 20px rgba(240,136,62,0.05);
    position: relative;
    overflow: hidden;
  }
  .neural-pane::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #f0883e, transparent);
    animation: scanLine 3s linear infinite;
  }
  @keyframes scanLine {
    0% { top: 0; opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }
  .neural-title {
    font-size: 10px;
    color: #f0883e;
    letter-spacing: 2px;
    margin-bottom: 12px;
    text-align: center;
    text-transform: uppercase;
    text-shadow: 0 0 8px #f0883e;
  }

  .neural-svg { width: 100%; height: 350px; }
  .hex {
    fill: #1a1f29;
    stroke: rgba(240,136,62,0.4);
    stroke-width: 1;
    filter: drop-shadow(0 0 4px rgba(240,136,62,0.3));
    transition: all 0.3s ease;
  }
  .hex.active {
    fill: #f0883e;
    stroke: #f0883e;
    filter: drop-shadow(0 0 8px #f0883e);
  }
  .hex.done {
    fill: #3fb950;
    stroke: #3fb950;
    filter: drop-shadow(0 0 6px #3fb950);
  }
  .hex-text {
    font-size: 8px;
    fill: #e6edf3;
    text-anchor: middle;
    dominant-baseline: middle;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    pointer-events: none;
  }
  .hex-text.active-text { fill: #fff; }
  .hex-pct {
    font-size: 9px;
    fill: #fcd34d;
    text-anchor: middle;
    dominant-baseline: middle;
    font-weight: 700;
    pointer-events: none;
  }

  .neural-status {
    margin-top: 8px;
    font-size: 10px;
    color: #6e7681;
    text-align: center;
    border-top: 1px solid rgba(240,136,62,0.2);
    padding-top: 8px;
  }
  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #f0883e;
    margin-right: 4px;
    animation: blink 1.5s ease-in-out infinite;
    box-shadow: 0 0 6px #f0883e;

<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * W, y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
    r: Math.random() * 1.5 + 0.5,
    c: ['#f0883e', '#fcd34d', '#ff5f57'][Math.floor(Math.random() * 3)]
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    ctx.fillStyle = p.c;
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 120) {
        ctx.strokeStyle = 'rgba(240,136,62,' + (0.15 - d/800) + ')';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();

function activateHex(id) {
  const el = document.getElementById('hex-' + id);
  const txt = document.getElementById('hex-text-' + id);
  if (el) el.classList.add('active');
  if (txt) txt.classList.add('active-text');
}
function updatePct(id, pct) {
  const el = document.getElementById('hex-pct-' + id);
  if (el) { el.textContent = pct + '%'; el.style.opacity = '1'; }
}
function completeHex(id) {
  const el = document.getElementById('hex-' + id);
  if (el) { el.classList.remove('active'); el.classList.add('done'); }
}
