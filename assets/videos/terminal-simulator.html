<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕸️ 神经网络 · 科幻终端</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #050810;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    padding: 20px;
    overflow: hidden;
    position: relative;
  }

  /* 背景：星空 + 网格 */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(0,212,255,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(168,85,247,0.15) 0%, transparent 50%),
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px) 0 0 / 40px 40px,
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px) 0 0 / 40px 40px;
    z-index: 0;
    animation: bgShift 20s linear infinite;
  }
  @keyframes bgShift {
    from { background-position: 0 0, 0 0, 0 0, 0 0; }
    to { background-position: 0 0, 0 0, 40px 40px, 40px 40px; }
  }

  /* 粒子层 */
  #particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  .stage-wrap {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 1100px;
    display: flex;
    gap: 16px;
    align-items: stretch;
  }

  /* 左侧：神经网络可视化 */
  .neural-pane {
    width: 200px;
    background: linear-gradient(180deg, rgba(13,17,23,0.95) 0%, rgba(22,27,34,0.85) 100%);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 0 40px rgba(0,212,255,0.15), inset 0 0 20px rgba(0,212,255,0.05);
    position: relative;
    overflow: hidden;
  }
  .neural-pane::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #00d4ff, transparent);
    animation: scanLine 3s linear infinite;
  }
  @keyframes scanLine {
    0% { top: 0; opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }
  .neural-title {
    font-size: 10px;
    color: #00d4ff;
    letter-spacing: 2px;
    margin-bottom: 12px;
    text-align: center;
    text-transform: uppercase;
    text-shadow: 0 0 8px #00d4ff;
  }

  /* SVG 神经网络 */
  .neural-svg {
    width: 100%;
    height: 280px;
  }
  .neural-node {
    fill: #00d4ff;
    stroke: rgba(0,212,255,0.3);
    stroke-width: 1;
    filter: drop-shadow(0 0 6px #00d4ff);
    animation: nodePulse 2s ease-in-out infinite;
  }
  .neural-node.main {
    fill: #fff;
    filter: drop-shadow(0 0 12px #fff);
  }
  .neural-node.research { animation-delay: 0s; }
  .neural-node.project { animation-delay: 0.2s; }
  .neural-node.data { animation-delay: 0.4s; }
  .neural-node.report { animation-delay: 0.6s; }
  @keyframes nodePulse {
    0%, 100% { r: 8; }
    50% { r: 11; }
  }
  .neural-link {
    stroke: rgba(0,212,255,0.4);
    stroke-width: 1;
    stroke-dasharray: 4 4;
    animation: linkFlow 1.5s linear infinite;
  }
  @keyframes linkFlow {
    to { stroke-dashoffset: -16; }
  }
  .neural-link.active {
    stroke: #00d4ff;
    stroke-width: 2;
    filter: drop-shadow(0 0 4px #00d4ff);
    animation: linkFlow 0.8s linear infinite;
  }

  .neural-node-label {
    font-size: 9px;
    fill: #8b949e;
    text-anchor: middle;
    text-transform: uppercase;
  }
  .neural-node-label.main { fill: #fff; }

  .neural-status {
    margin-top: 8px;
    font-size: 10px;
    color: #6e7681;
    text-align: center;
    border-top: 1px solid rgba(0,212,255,0.2);
    padding-top: 8px;
  }
  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #3fb950;
    margin-right: 4px;
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* 右侧：终端窗口 */
  .terminal-window {
    flex: 1;
    background: linear-gradient(180deg, rgba(13,17,23,0.95) 0%, rgba(22,27,34,0.85) 100%);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,212,255,0.15), inset 0 0 20px rgba(0,212,255,0.05);
    position: relative;
  }
  .terminal-window::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #00d4ff, transparent);
    animation: scanLine 3s linear infinite;
  }
  .terminal-titlebar {
    background: linear-gradient(180deg, #21262d 0%, #161b22 100%);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid rgba(0,212,255,0.2);
  }
  .titlebar-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
  }
  .dot-red { background: #ff5f57; box-shadow: 0 0 6px #ff5f57; }
  .dot-yellow { background: #febc2e; box-shadow: 0 0 6px #febc2e; }
  .dot-green { background: #28c840; box-shadow: 0 0 6px #28c840; }
  .titlebar-title {
    flex: 1;
    text-align: center;
    color: #00d4ff;
    font-size: 13px;
    text-shadow: 0 0 6px rgba(0,212,255,0.5);
    letter-spacing: 1px;
  }
  .terminal-body {
    padding: 16px 20px;
    min-height: 380px;
    max-height: 520px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(0,212,255,0.3) #0d1117;
  }
  .terminal-body::-webkit-scrollbar { width: 6px; }
  .terminal-body::-webkit-scrollbar-track { background: #0d1117; }
  .terminal-body::-webkit-scrollbar-thumb {
    background: rgba(0,212,255,0.3);
    border-radius: 3px;
  }

  .log-line {
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
    opacity: 0;
    transform: translateX(-8px);
    animation: lineAppear 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes lineAppear {
    to { opacity: 1; transform: translateX(0); }
  }
  .log-time { color: #6e7681; }
  .log-main { color: #e6edf3; }
  .log-send { color: #79c0ff; text-shadow: 0 0 4px rgba(121,192,255,0.5); }
  .log-ok { color: #3fb950; text-shadow: 0 0 4px rgba(63,185,80,0.5); }
  .log-phase { color: #d2a8ff; text-shadow: 0 0 4px rgba(210,168,255,0.5); }
  .log-warn { color: #f0883e; }
  .log-data { color: #56d364; }
  .log-sep { color: #30363d; }

  .cursor-blink {
    display: inline-block;
    width: 8px; height: 15px;
    background: #00d4ff;
    box-shadow: 0 0 6px #00d4ff;
    animation: cursor 1s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }
  @keyframes cursor {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .progress-bar-wrap {
    display: flex;
    gap: 4px;
    margin: 4px 0 8px 0;
    flex-wrap: wrap;
  }
  .progress-row {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    width: 100%;
  }
  .progress-track {
    flex: 1; min-width: 100px; height: 6px;
    background: #21262d;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid rgba(0,212,255,0.15);
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    width: 0%;
    transition: width 0.6s ease;
    box-shadow: 0 0 8px currentColor;
  }
  .fill-research { background: #00d4ff; color: #00d4ff; }
  .fill-project { background: #a855f7; color: #a855f7; }
  .fill-data { background: #56d364; color: #56d364; }
  .fill-report { background: #f0883e; color: #f0883e; }

  .progress-label {
    font-size: 10px;
    width: 60px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .progress-pct {
    font-size: 10px;
    width: 36px;
    text-align: right;
  }

  .tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
    margin-right: 4px;
    letter-spacing: 0.5px;
  }
  .tag-research { background: rgba(0,212,255,0.15); color: #00d4ff; border: 1px solid rgba(0,212,255,0.3); }
  .tag-project { background: rgba(168,85,247,0.15); color: #a855f7; border: 1px solid rgba(168,85,247,0.3); }
  .tag-data { background: rgba(86,211,100,0.15); color: #56d364; border: 1px solid rgba(86,211,100,0.3); }
  .tag-report { background: rgba(240,136,62,0.15); color: #f0883e; border: 1px solid rgba(240,136,62,0.3); }
  .tag-main { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3); }

  /* 数据流粒子 */
  .data-pulse {
    fill: #00d4ff;
    filter: drop-shadow(0 0 4px #00d4ff);
    animation: dataPulse 1.5s ease-in-out infinite;
  }
  @keyframes dataPulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
</style>
</head>

<script>
// 粒子背景
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    r: Math.random() * 1.5 + 0.5,
    c: ['#00d4ff', '#a855f7', '#56d364'][Math.floor(Math.random() * 3)]
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    ctx.fillStyle = p.c;
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  // 连线
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 120) {
        ctx.strokeStyle = 'rgba(0,212,255,' + (0.15 - d/800) + ')';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();

const LOGS = [
  { cls: 'log-main', text: '[09:00:01] <span class="tag tag-main">MAIN</span> 收到任务：分析星恒电源 13.73% 收购', delay: 0 },

const progressHTML = `
<div style="margin: 8px 0 12px 0;">

function animateBar(id, pct) {
  const el = document.getElementById('bar-' + id);
  const lbl = document.getElementById('pct-' + id);
  if (!el) return;
  el.style.width = pct + '%';
  if (lbl) lbl.textContent = pct + '%';
}

const progressTimeline = [
  { t: 1900, id: 'research', pct: 15 },
  { t: 2000, id: 'project', pct: 10 },
  { t: 2100, id: 'data', pct: 15 },
  { t: 2200, id: 'report', pct: 10 },
  { t: 3700, id: 'research', pct: 50 },
  { t: 4300, id: 'data', pct: 40 },
  { t: 5000, id: 'research', pct: 70 },
  { t: 5600, id: 'project', pct: 50 },
  { t: 6200, id: 'data', pct: 80 },
  { t: 6800, id: 'research', pct: 95 },
  { t: 7400, id: 'project', pct: 80 },
  { t: 8000, id: 'research', pct: 100 },
  { t: 8400, id: 'data', pct: 100 },
  { t: 8700, id: 'project', pct: 100 },
  { t: 9300, id: 'report', pct: 100 },
];

let progIdx = 0;
let startTime = null;
function runProgress(timestamp) {
  if (!startTime) startTime = timestamp;
  const elapsed = timestamp - startTime;
  while (progIdx < progressTimeline.length && progressTimeline[progIdx].t <= elapsed) {
    const item = progressTimeline[progIdx];
    animateBar(item.id, item.pct);
    progIdx++;
  }
  if (progIdx < progressTimeline.length || elapsed < 10000) {
    requestAnimationFrame(runProgress);
  }
}

LOGS.forEach((log) => {
  if (log === null) {
    setTimeout(() => {
      const div = document.createElement('div');
      div.innerHTML = progressHTML;
      div.style.opacity = '0';
      div.style.transform = 'translateX(-8px)';
      div.style.animation = 'lineAppear 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';
      terminalBody.appendChild(div);
      setTimeout(() => terminalBody.scrollTop = terminalBody.scrollHeight, 50);
      requestAnimationFrame(runProgress);
    }, 2600);
    return;
  }
  setTimeout(() => {
    const div = document.createElement('div');
    div.className = 'log-line ' + log.cls;
    div.innerHTML = log.text;
    terminalBody.appendChild(div);
    setTimeout(() => terminalBody.scrollTop = terminalBody.scrollHeight, 20);
  }, log.delay);
});
</script>
